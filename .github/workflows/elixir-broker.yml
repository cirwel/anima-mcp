name: Elixir Broker

# Only runs when the Elixir broker changes — keeps it off the Python CI path.
on:
  push:
    branches: [main, master]
    paths:
      - "anima_broker/**"
      - ".github/workflows/elixir-broker.yml"
  pull_request:
    paths:
      - "anima_broker/**"
      - ".github/workflows/elixir-broker.yml"

jobs:
  mix-test:
    runs-on: ubuntu-latest
    name: mix-test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    # Gates (blocking): the two combos we actually ship/develop on —
    #   * 1.18 / OTP 27  — Lumen's Pi (the deploy target; verified on-device)
    #   * 1.19 / OTP 28  — the dev box
    # 1.20 / OTP 28 is a non-blocking forward-check: it surfaces the next
    # minor's new warnings early (e.g. it caught an unused `require`) without
    # making the PR red over a future-version issue. Flip `experimental` off
    # once the Pi moves to 1.20.
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.18"
            otp: "27"
            experimental: false
          - elixir: "1.19"
            otp: "28"
            experimental: false
          - elixir: "1.20"
            otp: "28"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    defaults:
      run:
        working-directory: anima_broker
    steps:
      - uses: actions/checkout@v7

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore deps/_build cache
        uses: actions/cache@v6
        with:
          path: |
            anima_broker/deps
            anima_broker/_build
          key: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('anima_broker/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test
