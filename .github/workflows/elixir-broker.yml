name: Elixir Broker

# Only runs when the Elixir broker changes — keeps it off the Python CI path.
on:
  push:
    branches: [main, master]
    paths:
      - "anima_broker/**"
      - ".github/workflows/elixir-broker.yml"
  pull_request:
    paths:
      - "anima_broker/**"
      - ".github/workflows/elixir-broker.yml"

jobs:
  mix-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: anima_broker
    steps:
      - uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          # Match the dev/Pi toolchain (Elixir 1.19 on OTP 28).
          elixir-version: "1.19"
          otp-version: "28"

      - name: Restore deps/_build cache
        uses: actions/cache@v4
        with:
          path: |
            anima_broker/deps
            anima_broker/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('anima_broker/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test
